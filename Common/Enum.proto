syntax = "proto3";
package Protocol;

enum ClassType {
  CLASS_NONE = 0;
  ASSASSIN = 1;
  CLERIC = 2;
  RANGER = 3;
  TEMPLAR = 4;
}

enum RoomStatus {
    RECRUITING = 0; 
    IN_PROGRESS = 1; 
}

enum DungeonFailReason
{
    Ready = 0;       // 모든 멤버가 레디를 안 했을 경우
    FullDungeon = 1; // 4개가 다 찼을 경우
}

enum MailFailReason
{
    NONE_ERROR = 0; 
    NONE_RECEIVER = 1; // 받는 사람 없음
    NONE_GOLD = 2;     // 골드 부족
    NONE_ITEM = 3;     // 아이템 없음
}

enum EPvpState
{
    PVP_STATE_INACTIVE = 0;   // 비활성화 상태 
    PVP_STATE_WARN_START = 1; // 열리기 5초 전 경고
    PVP_STATE_ACTIVE = 2;     // 활성화 상태, 플레이어 bIsActive 활성화
    PVP_STATE_WARN_END = 3;   // 닫히기 5초 전 경고 
}
