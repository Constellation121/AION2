syntax = "proto3";

package Protocol;

message C_SignUpPacket {
  string id = 1;
  string password = 2;
  EClassType classType = 3;
}

message S_SignUpResultPacket {
  bool success = 1;     
}

message C_LoginPacket {
  string id = 1;
  string password = 2;
}

message S_LoginSuccessPacket {
  EClassType playerClass = 1;
  int32 gold = 2;
  int32 exp = 3;
  int32 hp = 4;
  bool success = 5;
  uint32 playerId = 6;  
}